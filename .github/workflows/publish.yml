name: publish

# Publishes to PyPI on a v* tag push or a GitHub Release.
# Auth: PYPI_API_TOKEN repo secret (set in Settings -> Secrets -> Actions).
on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true  # tag + release double-trigger must not fail the run
