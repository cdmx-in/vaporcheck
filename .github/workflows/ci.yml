name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # offline: pure parser logic, no network
      - name: install-command parser
        run: python vaporcheck/test_parse.py

      # online: these hit real PyPI / npm registries
      - name: hook behavior
        run: python vaporcheck/run_spike.py
      - name: MCP client handshake
        run: python vaporcheck/test_mcp.py
      - name: cache latency / TTL
        run: python vaporcheck/test_cache.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
